name: 单元测试

on:
  workflow_dispatch:
  workflow_call:
    secrets:
      UNITY_LICENSE:
        required: true
      UNITY_EMAIL:
        required: true
      UNITY_PASSWORD:
        required: true

jobs:
  test-dotnet:
    name: 测试 .NET 环境
    uses: ./.github/workflows/test-dotnet.yml
    permissions:
      checks: write
      contents: read
      actions: read
      security-events: write

  test-go:
    name: 测试 Go 环境
    uses: ./.github/workflows/test-go.yml
    permissions:
      checks: write
      contents: read
      actions: read
      security-events: write

  test-unity:
    name: 测试 Unity 环境
    uses: ./.github/workflows/test-unity.yml
    permissions:
      checks: write
      contents: read
      actions: read
      security-events: write
    secrets:
      UNITY_LICENSE: ${{ secrets.UNITY_LICENSE }}
      UNITY_EMAIL: ${{ secrets.UNITY_EMAIL }}
      UNITY_PASSWORD: ${{ secrets.UNITY_PASSWORD }}
