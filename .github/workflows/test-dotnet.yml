name: 单元测试（.NET）

on:
  workflow_dispatch:
    inputs:
      target_dotnet:
        description: "编译环境"
        required: false
        type: string
        default: '["8.0.x", "9.0.x", "10.0.x"]'
      target_os:
        description: "运行环境"
        required: false
        type: string
        default: '["windows-latest", "ubuntu-latest", "macos-latest"]'
  workflow_call:
    inputs:
      target_dotnet:
        required: false
        type: string
        default: '["8.0.x", "9.0.x", "10.0.x"]'
      target_os:
        required: false
        type: string
        default: '["windows-latest", "ubuntu-latest", "macos-latest"]'

permissions:
  checks: write
  contents: read
  actions: read
  security-events: write

jobs:
  test:
    name: 测试 .NET ${{ matrix.dotnet }}（${{ matrix.os }}）环境
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        dotnet: ${{ fromJson(github.event.inputs.target_dotnet || inputs.target_dotnet) }}
        os: ${{ fromJson(github.event.inputs.target_os || inputs.target_os) }}
    env:
      TZ: "Asia/Shanghai"
      DOTNET_NOLOGO: true
      DOTNET_CLI_TELEMETRY_OPTOUT: true

    steps:
      - name: 检出项目仓库
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: 安装编译环境
        id: setup-dotnet
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: ${{ matrix.dotnet }}

      - name: 运行单元测试
        shell: bash
        run: |
          echo "🔍 运行测试..."

          mkdir -p Tests~/DotNet
          echo '{"sdk":{"version": "${{ steps.setup-dotnet.outputs.dotnet-version }}"}}' > ./global.json
          echo "使用 dotnet: $(dotnet --version)"

          if ! dotnet test \
            --configuration Release \
            --verbosity normal \
            --logger "trx;LogFileName=Output.trx" \
            --logger "console;verbosity=normal" \
            --collect:"XPlat Code Coverage" \
            --results-directory ./Tests~/DotNet > Tests~/DotNet/output.log 2>&1; then
            echo "❌ 测试失败"
            cat Tests~/DotNet/output.log
            exit 1
          fi

          dotnet tool install -g dotnet-reportgenerator-globaltool
          reportgenerator \
            -reports:Tests~/DotNet/**/coverage.cobertura.xml \
            -targetdir:Tests~/DotNet/Coverage \
            -reporttypes:Html

          echo "📊 覆盖率报告:"
          find Tests~/DotNet -name coverage.cobertura.xml -print

          echo "✅ 测试通过"

      - name: 上传测试报告
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: Test#${{ github.run_number }}.NET@${{ matrix.dotnet }}.${{ matrix.os }}
          path: |
            Tests~/DotNet/Output.trx
            Tests~/DotNet/Coverage
          retention-days: 14
